<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon EDT — Thom</title>

<style>
:root {
  --bg:#EDF0F7;--surface:#FFFFFF;--surface2:#E2E8F4;--border:#C4CEDF;
  --text:#1B2D52;--text2:#4A5F80;--text3:#8A9BB8;
  --accent:#2E6FA8;--accent-gold:#C9A96E;--radius:8px;
  --hour-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
.topbar{background:#1B2D52;border-bottom:3px solid #C9A96E;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0}
.week-nav{display:flex;align-items:center;gap:6px}
.week-nav button{background:#E4EAF8;border:1px solid transparent;border-radius:var(--radius);padding:3px 10px;cursor:pointer;color:#1B2D52;font-size:14px;font-weight:600;line-height:1;display:flex;align-items:center;justify-content:center}
.week-nav button:hover{background:#fff;color:#1B2D52}
.week-label{font-size:14px;font-weight:600;min-width:160px;text-align:center;color:#E4EAF8}
.btn{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:6px 11px;cursor:pointer;font-size:12px;color:var(--text2);display:inline-flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap}
.topbar .btn{border-color:#2E4A7A;color:#94A8C8}
.topbar .btn:hover{background:#253D6A;color:#E4EAF8}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.topbar .btn.primary{background:#C9A96E;border-color:#C9A96E;color:#1B2D52;font-weight:700}
.btn.danger{color:#c0392b;border-color:#c0392b}
.btn.danger:hover{background:#fdf0ee}

/* ── Body layout ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── Block palette (left) ── */
.palette{width:140px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);border-top:2px solid #C9A96E;padding:10px 10px 0;overflow:visible;display:flex;flex-direction:column;gap:0}
.pal-section-label{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.pal-block{border-radius:6px;padding:8px 10px;cursor:grab;font-size:12px;font-weight:600;user-select:none;border:1.5px solid transparent;transition:transform .1s,opacity .1s;display:flex;align-items:center;gap:6px;touch-action:none}
.pal-block:active{cursor:grabbing;transform:scale(.97);opacity:.8}
.pal-block i{font-size:14px}
.pal-add{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--accent);cursor:pointer;padding:4px 2px}
.pal-add:hover{opacity:.7}
.pal-sep{height:1px;background:var(--border);margin:4px 0}

/* ── Stats ── */
.pal-stat-row{display:flex;align-items:center;gap:5px;padding:3px 2px;font-size:10px;color:var(--text2)}
.pal-stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pal-stat-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pal-stat-val{font-weight:600;color:var(--text);font-size:10px}

/* ── Main area ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.day-headers{display:grid;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.day-head{font-size:11px;font-weight:600;color:var(--text3);text-align:center;padding:7px 2px;letter-spacing:.05em;text-transform:uppercase}
.day-head.today{color:var(--accent);font-weight:800}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
.time-grid{display:flex;position:relative}

/* ── Palette tools ── */
.pal-tools{margin-top:auto;padding-top:6px}
.pal-tools-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.pal-tool-btn{padding:5px 7px !important;font-size:12px !important}
.pal-zoom{border:1px solid var(--border);border-radius:var(--radius);padding:2px 4px;background:var(--surface2)}
.pal-export-wrap{width:100%}
.pal-export-btn{width:100%;justify-content:center;gap:5px}
.pal-export-wrap .export-menu{min-width:160px}
.pal-hide-btn{width:100%;justify-content:center;margin-bottom:8px;font-size:11px;gap:5px;color:var(--text3)}

/* ── Time axis ── */
.time-axis{width:52px;flex-shrink:0;position:sticky;left:0;background:var(--bg);z-index:2}
.time-tick{position:absolute;right:6px;font-size:10px;color:var(--text3);transform:translateY(-50%);white-space:nowrap}

/* ── Day columns ── */
.day-cols{flex:1;display:grid;position:relative}
.day-col{position:relative;border-right:1px solid var(--border)}
.day-col:last-child{border-right:none}

/* ── Hour lines ── */
.hour-line{position:absolute;left:0;right:0;pointer-events:none}
.hour-line.full{border-top:1px solid var(--border)}
.hour-line.half{border-top:1px dashed var(--border)}
.hour-line.quarter{border-top:1px dotted #D4DCE8}

/* ── Placed blocks ── */
.placed-block{position:absolute;left:2px;right:2px;border-radius:6px;cursor:grab;z-index:3;overflow:hidden;border:1.5px solid transparent;display:flex;flex-direction:column;justify-content:flex-start;padding:4px 7px;min-height:18px;touch-action:none}
.placed-block:active{cursor:grabbing;opacity:.85;z-index:10}
.placed-block .pb-title{font-size:11px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.placed-block .pb-time{font-size:9px;opacity:.75;line-height:1.2;margin-top:1px}
.placed-block .pb-note{font-size:9px;padding:1px 6px 3px;line-height:1.35;opacity:.75;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resize-handle{position:absolute;bottom:0;left:0;right:0;height:10px;cursor:ns-resize;background:transparent;touch-action:none}
.placed-block:hover{outline:2px solid rgba(0,0,0,.15);outline-offset:-1px}

/* ── Block colors ── */
.c-teal{background:#D8EFF8;border-color:#3BA8C8;color:#0D3D52}
.c-green{background:#DFF0E4;border-color:#5AAF72;color:#0E3519}
.c-blue{background:#D4E6F4;border-color:#2E6FA8;color:#0D2540}
.c-purple{background:#E6E4FA;border-color:#7066CC;color:#1E1A55}
.c-amber{background:#F5EDD8;border-color:#C9A96E;color:#3E2800}
.c-coral{background:#F4E4DE;border-color:#C0664A;color:#40180C}
.c-pink{background:#F5E2EC;border-color:#C06088;color:#420C28}
.c-gray{background:#E2E8F4;border-color:#8A9BB8;color:#1B2D52}
.c-red{background:#F4E2E2;border-color:#C05050;color:#401010}

/* ── Week save strip ── */
.week-bar-wrap{padding:0 12px 12px;flex-shrink:0;background:var(--bg)}
.week-bar{background:#FFFFFF;border:1px solid #C4CEDF;border-radius:14px;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;box-shadow:0 2px 12px rgba(27,45,82,.08)}
.week-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.week-chip{font-size:11px;padding:4px 9px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:none;color:var(--text2);font-family:inherit}
.week-chip:hover{background:var(--surface2)}
.week-chip.active{border-color:#2E6FA8;color:#2E6FA8;background:#D4E6F4}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:20px 22px;width:340px;max-width:95vw}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.field input:focus{border-color:var(--accent)}
.color-pick{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.active{border-color:var(--text)}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* ── Toast ── */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}

/* ── Drop highlight ── */
.day-col.drag-over{background:rgba(59,125,216,.06)}

/* ── Block panel (right sidebar) ── */
.block-panel{position:fixed;top:0;right:-340px;width:320px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:50;display:flex;flex-direction:column;transition:right .22s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 16px rgba(0,0,0,.08)}
.block-panel.open{right:0}
.bp-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.bp-header-title{font-size:14px;font-weight:600}
.bp-body{flex:1;overflow-y:auto;padding:16px}
.bp-section{margin-bottom:18px}
.bp-label{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.bp-input{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.bp-input:focus{border-color:var(--accent)}
textarea.bp-input{resize:vertical;min-height:72px;line-height:1.5}
.bp-cats{display:flex;flex-wrap:wrap;gap:5px}
.bp-cat-chip{border-radius:20px;padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:transform .1s}
.bp-cat-chip:hover{transform:scale(1.04)}
.bp-cat-chip.sel{box-shadow:0 0 0 2px var(--text)}
.bp-time-row{display:flex;align-items:center;gap:8px}
.bp-time-row input[type=time]{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:6px 9px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.bp-time-row input[type=time]:focus{border-color:var(--accent)}
.bp-sep{font-size:12px;color:var(--text3)}
.bp-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.bp-overlay{position:fixed;inset:0;z-index:49;display:none}
.bp-overlay.open{display:block}

/* ── Touch ghost ── */
.touch-ghost{position:fixed;z-index:1000;opacity:.7;pointer-events:none;border-radius:6px;padding:8px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;border:1.5px solid transparent;min-width:90px}

@media(prefers-color-scheme:dark){
  :root{--bg:#0D1829;--surface:#172240;--surface2:#1F2E52;--border:#2A3D65;--text:#E4EAF8;--text2:#8A9EC0;--text3:#4A5F82;--accent:#5B9FD4}
  .topbar{background:#0A1020;border-bottom-color:#C9A96E}
  .topbar .btn{border-color:#1E3056;color:#6A84A8}
  .topbar .btn:hover{background:#182040}
  .week-bar-wrap{background:#0D1829}  .week-bar{background:#172240;border-color:#2A3D65;box-shadow:0 2px 12px rgba(0,0,0,.3)}
  .c-teal{background:#0A2232;border-color:#3BA8C8;color:#9AD4EC}
  .c-green{background:#0A2014;border-color:#5AAF72;color:#9AD4A8}
  .c-blue{background:#0A1828;border-color:#3F80BC;color:#9AC0E4}
  .c-purple{background:#12103A;border-color:#7066CC;color:#BCB8F2}
  .c-amber{background:#221608;border-color:#C9A96E;color:#EDD8A4}
  .c-coral{background:#220E06;border-color:#C0664A;color:#EDB898}
  .c-pink{background:#1C0A14;border-color:#C06088;color:#EDACC8}
  .c-gray{background:#141E30;border-color:#6A7A98;color:#B0C0D8}
  .c-red{background:#1E0808;border-color:#C05050;color:#EDB0B0}
  .hour-line.quarter{border-top:1px dotted #1A2840}
  .day-col.weekend{background:rgba(201,169,110,.13)}
  .day-head.weekend{color:#C9A96E}
}

/* ── Export dropdown ── */
.export-wrap{position:relative;display:inline-flex}
.export-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:300;min-width:160px;padding:4px 0;display:none}
.export-menu.open{display:block}
.export-item{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;cursor:pointer;color:var(--text2);white-space:nowrap;font-family:inherit;background:none;border:none;width:100%;text-align:left}
.export-item:hover{background:var(--surface2);color:var(--text)}
.export-item i{font-size:14px}

/* ── Edit catégorie ── */
.pal-block{position:relative}
.pal-edit{position:absolute;top:3px;right:4px;font-size:9px;opacity:0;cursor:pointer;transition:opacity .15s;line-height:1;padding:1px 3px;border-radius:3px;background:rgba(0,0,0,.12)}
.pal-block:hover .pal-edit{opacity:1}

/* ── Weekend columns ── */
.day-col.weekend{background:rgba(201,169,110,.18)}
.day-head.weekend{color:#C9A96E}

/* ── Ligne heure courante ── */
.time-now-dot{width:8px;height:8px;border-radius:50%;background:#E74C3C;flex-shrink:0;margin-left:-4px}
.time-now-line{flex:1;height:2px;background:#E74C3C;opacity:.75}

/* ── Notif bell ── */
.btn-notif-on{color:#C9A96E !important;border-color:#C9A96E !important}

/* ── Modal delete btn ── */
.modal-actions{display:flex;gap:8px;margin-top:16px;align-items:center}
.modal-actions .spacer{flex:1}

/* ── Toggle palette ── */
.palette{transition:width .22s cubic-bezier(.4,0,.2,1),padding .22s,opacity .22s}
.palette.collapsed{width:0 !important;padding:0 !important;border:none !important;overflow:hidden !important}
.btn-pal-toggle{font-size:16px;padding:4px 9px}

/* ── Dupliquer bloc ── */
/* (btn dans bp-footer, style btn existant) */

/* ── Réordonner catégories ── */
.pal-order{position:absolute;top:50%;right:20px;transform:translateY(-50%);display:none;flex-direction:column;gap:1px}
.pal-block:hover .pal-order{display:flex}
.pal-order-btn{font-size:8px;line-height:1;cursor:pointer;opacity:.6;padding:1px 2px;background:rgba(0,0,0,.1);border-radius:2px;user-select:none}
.pal-order-btn:hover{opacity:1}

/* ── Animation semaine ── */
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
@keyframes fadeSlideInLeft{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
.week-anim-right{animation:fadeSlideIn .18s ease}
.week-anim-left{animation:fadeSlideInLeft .18s ease}

/* ── Auto-save indicator ── */
.save-dot{width:6px;height:6px;border-radius:50%;background:#5AAF72;display:inline-block;margin-left:4px;opacity:0;transition:opacity .3s}
.save-dot.show{opacity:1}

/* ── Vue jour ── */
.view-toggle{display:flex;border:1px solid #2E4A7A;border-radius:var(--radius);overflow:hidden}
.view-toggle button{background:none;border:none;padding:5px 10px;cursor:pointer;color:#94A8C8;font-size:11px;font-weight:600;font-family:inherit}
.view-toggle button.active{background:#E4EAF8;color:#1B2D52}
.day-view .day-col{display:none}
.day-view .day-col.day-selected{display:block}
.day-view .day-cols{grid-template-columns:1fr !important}
.day-view .day-head{opacity:.4;cursor:pointer;transition:opacity .15s}
.day-view .day-head:hover{opacity:.8}
.day-view .day-head.day-selected{opacity:1;color:var(--accent);font-size:13px}

/* ── Mode lecture seule ── */
.readonly-mode .placed-block{pointer-events:none;cursor:default}
.readonly-mode .pal-block{pointer-events:none;opacity:.6}
.readonly-mode .pal-edit{display:none}
.readonly-mode .day-col{pointer-events:none}
.btn-lock-on{color:#E74C3C !important;border-color:#E74C3C !important}

/* ── Zoom grille ── */
.zoom-ctrl{display:flex;align-items:center;gap:2px}
.pal-zoom-row{display:flex;align-items:center;gap:4px;padding:4px 2px;margin-top:2px}
.zoom-btn{background:none;border:1px solid #2E4A7A;border-radius:4px;width:22px;height:22px;cursor:pointer;color:#94A8C8;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
.zoom-btn:hover{background:#253D6A;color:#E4EAF8}

/* ── Stats panel ── */
.stats-panel{position:fixed;top:0;right:-380px;width:340px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:50;display:flex;flex-direction:column;transition:right .22s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 16px rgba(0,0,0,.08)}
.stats-panel.open{right:0}
.sp-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sp-body{flex:1;overflow-y:auto;padding:16px}
.sp-title{font-size:14px;font-weight:700}
.sp-week{font-size:11px;color:var(--text3);margin-top:2px}
.sp-cat-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sp-name{font-size:12px;font-weight:600;width:70px;flex-shrink:0}
.sp-bar-wrap{flex:1;background:var(--surface2);border-radius:20px;height:8px;overflow:hidden}
.sp-bar{height:100%;border-radius:20px;transition:width .4s ease}
.sp-val{font-size:11px;color:var(--text2);width:36px;text-align:right;flex-shrink:0}
.sp-total{font-size:12px;font-weight:700;color:var(--text);padding:10px 0;border-top:1px solid var(--border);margin-top:4px}
.sp-compare{font-size:11px;color:var(--text3);margin-top:3px}
.sp-compare.up{color:#5AAF72}
.sp-compare.down{color:#E74C3C}
.sp-sep{height:1px;background:var(--border);margin:14px 0}

/* ── Responsive mobile ── */
@media(max-width:640px){
  .topbar{padding:7px 10px;gap:5px}
  .week-label{min-width:120px;font-size:13px}
  .topbar-right{flex-wrap:nowrap;overflow-x:auto;gap:4px;padding-bottom:2px}
  .topbar-right .btn{padding:5px 8px;font-size:11px}
  .zoom-ctrl{display:none}
  .view-toggle{display:flex !important}

  /* ── Palette : overlay (ne pousse plus la grille) ── */
  .body{position:relative;overflow:hidden}
  .palette{
    position:absolute;top:0;left:0;bottom:0;z-index:40;
    width:165px !important;
    box-shadow:4px 0 28px rgba(0,0,0,.5);
    transition:transform .22s cubic-bezier(.4,0,.2,1),opacity .2s;
    transform:translateX(0)
  }
  .palette.collapsed{
    transform:translateX(-110%) !important;
    width:165px !important;padding:10px 10px 0 !important;
    border:1px solid var(--border) !important;overflow:visible !important;opacity:0 !important
  }
  /* Backdrop semi-transparent pour fermer la palette */
  .pal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.38);z-index:39;display:none;cursor:pointer}
  .pal-backdrop.open{display:block}
  /* Blocs catégorie compacts */
  .pal-block{padding:6px 8px;font-size:11px}
  #pal-dynamic{gap:5px !important}

  /* ── Grille plein écran (palette overlay, pas de décalage) ── */
  .scroll-area{overflow-x:auto;overflow-y:auto}
  .day-headers{min-width:580px}
  .time-grid{min-width:580px}

  /* ── Blocs placés ── */
  .placed-block{padding:3px 5px}
  .placed-block .pb-title{white-space:normal;overflow:hidden;text-overflow:unset;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;font-size:10px}
  .placed-block .pb-time{font-size:8px;white-space:nowrap;opacity:.7}
  .placed-block .pb-note{display:none}
}
@media(max-width:420px){
  .week-label{min-width:90px;font-size:12px}
  .topbar-right .btn span.btn-label{display:none}
  .time-grid{min-width:540px}
}

/* ── Écran PIN ── */
#pin-screen{position:fixed;inset:0;z-index:9999;background:#0D1829;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.pin-logo{font-size:46px;margin-bottom:14px}
.pin-title{font-size:24px;font-weight:700;color:#E4EAF8;letter-spacing:.01em}
.pin-sub{font-size:13px;color:#4A5F82;margin-top:5px;margin-bottom:30px}
.pin-dots{display:flex;gap:18px;margin-bottom:10px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #2E4A7A;background:transparent;transition:background .12s,border-color .12s,transform .12s}
.pin-dot.filled{background:#C9A96E;border-color:#C9A96E;transform:scale(1.1)}
.pin-error{font-size:12px;color:#E74C3C;height:18px;margin-bottom:18px;text-align:center;font-weight:500}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:14px}
.pin-key{width:72px;height:72px;border-radius:50%;background:#172240;border:1px solid #2A3D65;color:#E4EAF8;font-size:22px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .1s,transform .1s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.pin-key:hover{background:#1F2E52}
.pin-key:active{transform:scale(.88);background:#253D6A}
.pin-key-del{font-size:19px;color:#8A9EC0}
.pin-key-empty{background:none!important;border:none!important;pointer-events:none}
@keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
.pin-dots.shake{animation:pinShake .35s ease}

/* ── Templates panel ── */
.templates-panel{position:fixed;top:0;right:-720px;width:680px;max-width:100vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:50;display:flex;flex-direction:column;transition:right .22s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.templates-panel.open{right:0}
.tmpl-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;flex-wrap:wrap}
.tmpl-htitle{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;flex-shrink:0}
.tmpl-hbtns{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tmpl-body{flex:1;display:flex;overflow:hidden}
.tmpl-list{width:220px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:6px}
.tmpl-card{border-radius:8px;border:1.5px solid var(--border);padding:10px 12px;cursor:pointer;background:none;transition:border-color .15s,background .15s;position:relative}
.tmpl-card:hover{background:var(--surface2)}
.tmpl-card.active{border-color:var(--accent);background:rgba(46,111,168,.08)}
.tmpl-card-name{font-size:12px;font-weight:600;color:var(--text);padding-right:20px}
.tmpl-card-count{font-size:10px;color:var(--text3);margin-top:2px}
.tmpl-card-del{position:absolute;top:8px;right:8px;font-size:11px;color:var(--text3);cursor:pointer;padding:1px 5px;border-radius:3px;line-height:1.4}
.tmpl-card-del:hover{background:#fdf0ee;color:#c0392b}
.tmpl-list-empty{font-size:11px;color:var(--text3);text-align:center;padding:24px 10px;line-height:1.6}
.tmpl-preview{flex:1;overflow-y:auto;padding:16px}
.tmpl-empty-msg{font-size:12px;color:var(--text3);text-align:center;padding:48px 20px;line-height:1.6}
.tmpl-preview-name{font-size:13px;font-weight:700;margin-bottom:16px;color:var(--text);display:flex;align-items:center;gap:6px}
.tmpl-day-section{margin-bottom:12px}
.tmpl-day-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px}
.tmpl-block-pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;margin:0 4px 5px 0;border:1.5px solid transparent}
.tmpl-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;flex-shrink:0}
@media(max-width:640px){.templates-panel{width:100vw}.tmpl-body{flex-direction:column}.tmpl-list{width:100%;height:180px;flex-shrink:0;border-right:none;border-bottom:1px solid var(--border)}}

.ti-svg{display:inline-block;vertical-align:middle;flex-shrink:0;width:1em;height:1em;overflow:visible}

          <button class="export-item" id="btn-import"><svg class="ti-svg" style="color:#8A9BB8"><use href="#ti-upload"></use></svg> Import JSON</button>

  <!-- Main -->

      <div class="day-headers" id="day-headers"></div>
      <div class="time-grid" id="time-grid">
        <div class="time-axis" id="time-axis"></div>
        <div class="day-cols" id="day-cols"></div>
      </div>
    </div>

<!-- Modal nouvelle catégorie -->

  <div class="modal">
    <h2 id="modal-title">Nouvelle catégorie</h2>
    <div class="field"><label>Nom</label><input type="text" id="modal-name" placeholder="Ex : Méditation"></div>
    <div class="field">
      <label>Couleur</label>
      <div class="color-pick" id="color-pick"></div>
    </div>
    <div class="field"><label>Icône Tabler (nom)</label><input type="text" id="modal-icon" placeholder="Ex : heart, run, music"></div>
    <input type="hidden" id="modal-cat-id">
    <div class="modal-actions">

<script>
// ══════════════════════════════════════════════════════════
// Constants
// ══════════════════════════════════════════════════════════
const HOUR_START = 6;
const HOUR_END   = 22;
const HOURS      = HOUR_END - HOUR_START;
let HOUR_PX    = 64;
let TOTAL_H    = HOURS * HOUR_PX;
const DAYS       = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const SNAP_MIN   = 15;
const SNAP_PX    = HOUR_PX / (60 / SNAP_MIN);

const COLORS = [
  {id:"teal"},  {id:"green"}, {id:"blue"},
  {id:"purple"},{id:"amber"}, {id:"coral"},
  {id:"pink"},  {id:"gray"},  {id:"red"},
];
const DOT_COLORS = {
  teal:"#3BA8C8",green:"#5AAF72",blue:"#2E6FA8",purple:"#7066CC",
  amber:"#C9A96E",coral:"#C0664A",pink:"#C06088",gray:"#8A9BB8",red:"#C05050"
};

const DEFAULT_CATS = [
  {id:"sport",  label:"Sport",    color:"green",  icon:"run"},
  {id:"sortie", label:"Sortie",   color:"teal",   icon:"walk"},
  {id:"bts",    label:"Études",   color:"blue",   icon:"school"},
  {id:"dev",    label:"Dev",      color:"purple", icon:"code"},
  {id:"piano",  label:"Piano",    color:"amber",  icon:"music"},
  {id:"perso",  label:"Perso",    color:"coral",  icon:"heart"},
  {id:"libre",  label:"Libre",    color:"gray",   icon:"coffee"},
];


// ── Chiffrement AES-GCM (données chiffrées localement) ──
const _SALT = new Uint8Array([107,101,114,108,117,109,121,115,56,53,57,49,101,100,116]);
let _cryptoKey = null;

async function _deriveKey(pin) {
  const mat = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(pin), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:_SALT, iterations:100000, hash:"SHA-256"},
    mat, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]
  );
}
async function _encryptJSON(obj) {
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const enc = await crypto.subtle.encrypt(
    {name:"AES-GCM", iv}, _cryptoKey, new TextEncoder().encode(JSON.stringify(obj))
  );
  const buf = new Uint8Array(12 + enc.byteLength);
  buf.set(iv); buf.set(new Uint8Array(enc), 12);
  return btoa(String.fromCharCode(...buf));
}
async function _decryptJSON(b64) {
  const buf = Uint8Array.from(atob(b64), x => x.charCodeAt(0));
  const dec = await crypto.subtle.decrypt(
    {name:"AES-GCM", iv:buf.slice(0,12)}, _cryptoKey, buf.slice(12)
  );
  return JSON.parse(new TextDecoder().decode(dec));
}

// ══════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════
function loadState() {
  try {
    const s = localStorage.getItem("edt_v3");
    if (s) { try { const p = JSON.parse(s); if (p && p.cats && p.weeks) return p; } catch(e2) {} }
  } catch(e) {}
  return {
    currentWeek: getWeekKey(new Date()),
    cats: JSON.parse(JSON.stringify(DEFAULT_CATS)),
    weeks: {}
  };
}
async function saveState() {
  try {
    const clean = Object.assign({}, STATE, {
      weeks: Object.fromEntries(
        Object.entries(STATE.weeks).filter(([, bl]) => bl && bl.length > 0)
      )
    });
    if (_cryptoKey) {
      localStorage.setItem("edt_v3", await _encryptJSON(clean));
    } else {
      localStorage.setItem("edt_v3", JSON.stringify(clean));
    }
  } catch(e) {}
}

let STATE = loadState();

// ── Préférences utilisateur (zoom, vue, palette) ──
function loadPrefs() {
  try { const p = localStorage.getItem("edt_prefs"); return p ? JSON.parse(p) : {}; } catch(e) { return {}; }
}
function savePrefs() {
  try {
    const palEl = document.getElementById("palette");
    localStorage.setItem("edt_prefs", JSON.stringify({
      zoomIdx,
      viewMode,
      palCollapsed: palEl ? palEl.classList.contains("collapsed") : false,
      notifEnabled
    }));
  } catch(e) {}
}
const _PREFS = loadPrefs();
let selectedSavedWeek = null;
let viewMode = "week"; // "week" | "day"
let selectedDay = (() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; })();

// ══════════════════════════════════════════════════════════
// Week helpers
// ══════════════════════════════════════════════════════════
function getWeekKey(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const day = d.getDay(); d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  const y = d.getFullYear();
  const jan1 = new Date(y, 0, 1);
  const wn = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${y}-W${String(wn).padStart(2,'0')}`;
}

function weekKeyToMonday(key) {
  const [yr, ws] = key.split('-W');
  const d = new Date(parseInt(yr), 0, 1 + (parseInt(ws) - 1) * 7);
  while (d.getDay() !== 1) d.setDate(d.getDate() - 1);
  return d;
}

function weekLabel(key) {
  const [yr, ws] = key.split('-W');
  const mon = weekKeyToMonday(key);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = d => d.toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
  return `S${parseInt(ws)} · ${fmt(mon)} – ${fmt(sun)}`;
}

function shiftWeek(delta) {
  const colsEl = document.getElementById("day-cols");
  colsEl.style.opacity = "0";
  setTimeout(() => {
    if (viewMode === "day") {
      selectedDay += delta;
      if (selectedDay < 0) {
        selectedDay = 6;
        const mon = weekKeyToMonday(STATE.currentWeek);
        mon.setDate(mon.getDate() - 7);
        STATE.currentWeek = getWeekKey(mon);
      } else if (selectedDay > 6) {
        selectedDay = 0;
        const mon = weekKeyToMonday(STATE.currentWeek);
        mon.setDate(mon.getDate() + 7);
        STATE.currentWeek = getWeekKey(mon);
      }
    } else {
      const mon = weekKeyToMonday(STATE.currentWeek);
      mon.setDate(mon.getDate() + delta * 7);
      STATE.currentWeek = getWeekKey(mon);
    }
    render();
    colsEl.classList.remove("week-anim-right","week-anim-left");
    void colsEl.offsetWidth;
    colsEl.classList.add(delta > 0 ? "week-anim-right" : "week-anim-left");
    colsEl.style.opacity = "";
  }, 80);
}

function ensureWeek(key) {
  if (!STATE.weeks[key]) STATE.weeks[key] = [];
}

function currentBlocks() {
  ensureWeek(STATE.currentWeek);
  return STATE.weeks[STATE.currentWeek];
}

// ══════════════════════════════════════════════════════════
// Time ↔ px
// ══════════════════════════════════════════════════════════
function minToY(totalMin) {
  return ((totalMin - HOUR_START * 60) / 60) * HOUR_PX;
}
function yToMin(y) {
  const raw = HOUR_START * 60 + (y / HOUR_PX) * 60;
  return Math.round(raw / SNAP_MIN) * SNAP_MIN;
}
function formatTimeShort(totalMin) {
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return m === 0 ? `${h}h` : `${h}h${String(m).padStart(2,'0')}`;
}
function formatTime(totalMin) {
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${String(h).padStart(2,'0')}h${m === 0 ? '00' : String(m).padStart(2,'0')}`;
}

// ══════════════════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════════════════
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// ══════════════════════════════════════════════════════════
// Build grid structure (once)
// ══════════════════════════════════════════════════════════
function buildGrid() {
  const headers = document.getElementById("day-headers");
  const axis    = document.getElementById("time-axis");
  const cols    = document.getElementById("day-cols");
  const grid    = document.getElementById("time-grid");

  grid.style.height = TOTAL_H + "px";
  axis.style.height = TOTAL_H + "px";
  cols.style.height = TOTAL_H + "px";

  const _mob = window.innerWidth <= 640;
  const _colW = _mob ? "85px" : "1fr";
  headers.style.gridTemplateColumns = `52px repeat(7, ${_colW})`;
  headers.innerHTML = "<div></div>";
  DAYS.forEach((d, i) => {
    const h = document.createElement("div");
    h.className = "day-head" + (i >= 5 ? " weekend" : "");
    h.dataset.di = i;
    h.textContent = d;
    headers.appendChild(h);
  });

  cols.style.gridTemplateColumns = `repeat(7, ${_colW})`;
  cols.innerHTML = "";
  for (let d = 0; d < 7; d++) {
    const col = document.createElement("div");
    col.className = "day-col" + (d >= 5 ? " weekend" : "");
    col.dataset.di = d;
    cols.appendChild(col);

    for (let h = HOUR_START; h < HOUR_END; h++) {
      for (let q = 0; q < 4; q++) {
        const y = minToY(h * 60 + q * 15);
        const line = document.createElement("div");
        line.className = "hour-line " + (q === 0 ? "full" : q === 2 ? "half" : "quarter");
        line.style.top = y + "px";
        col.appendChild(line);
      }
    }
    const lastLine = document.createElement("div");
    lastLine.className = "hour-line full";
    lastLine.style.top = TOTAL_H + "px";
    col.appendChild(lastLine);
  }

  axis.innerHTML = "";
  axis.style.position = "relative";
  axis.style.height = TOTAL_H + "px";
  for (let h = HOUR_START; h <= HOUR_END; h++) {
    const y = minToY(h * 60);
    const tick = document.createElement("div");
    tick.className = "time-tick";
    tick.style.top = y + "px";
    tick.textContent = `${h}h`;
    axis.appendChild(tick);
  }
}

// ══════════════════════════════════════════════════════════
// Stats par catégorie
// ══════════════════════════════════════════════════════════
function calcCatStats() {
  const stats = {};
  STATE.cats.forEach(c => { stats[c.id] = 0; });
  currentBlocks().forEach(b => {
    if (stats[b.cat] !== undefined) stats[b.cat] += (b.endMin - b.startMin);
    else stats[b.cat] = (stats[b.cat] || 0) + (b.endMin - b.startMin);
  });
  return stats;
}

function renderStats() {
  const pal = document.getElementById("pal-dynamic");
  // Remove old stats section if present
  pal.querySelectorAll(".pal-stats-sep, .pal-stats-label, .pal-stat-row").forEach(el => el.remove());

  const stats = calcCatStats();
  const active = STATE.cats.filter(c => (stats[c.id] || 0) > 0);
  if (active.length === 0) return;

  const sep = document.createElement("div");
  sep.className = "pal-sep pal-stats-sep";
  pal.appendChild(sep);

  const label = document.createElement("div");
  label.className = "pal-section-label pal-stats-label";
  label.textContent = "Cette semaine";
  pal.appendChild(label);

  active.forEach(cat => {
    const mins = stats[cat.id];
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    const val = h > 0 ? `${h}h${m ? String(m).padStart(2,'0') : ''}` : `${m}min`;
    const row = document.createElement("div");
    row.className = "pal-stat-row";
    row.innerHTML = `<span class="pal-stat-dot" style="background:${DOT_COLORS[cat.color]}"></span><span class="pal-stat-name">${cat.label}</span><span class="pal-stat-val">${val}</span>`;
    pal.appendChild(row);
  });
}

// ══════════════════════════════════════════════════════════
// Block panel
// ══════════════════════════════════════════════════════════
let editingIdx = null;

function openBlockPanel(idx) {
  editingIdx = idx;
  const block = currentBlocks()[idx];
  const cat   = STATE.cats.find(c => c.id === block.cat) || {label:"", color:"gray", icon:"circle"};

  document.getElementById("bp-title").value = block.title || "";
  document.getElementById("bp-note").value  = block.note  || "";

  const toTimeStr = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  document.getElementById("bp-start").value = toTimeStr(block.startMin);
  document.getElementById("bp-end").value   = toTimeStr(block.endMin);

  const catsEl = document.getElementById("bp-cats");
  catsEl.innerHTML = "";
  STATE.cats.forEach(c => {
    const chip = document.createElement("div");
    chip.className = "bp-cat-chip" + (c.id === block.cat ? " sel" : "");
    chip.classList.add("c-" + c.color);
    chip.dataset.catId = c.id;
    chip.innerHTML = `<svg class="ti-svg" style="font-size:11px;margin-right:3px"><use href="#ti-${c.icon}"></use></svg>${c.label}`;
    chip.addEventListener("click", () => {
      catsEl.querySelectorAll(".bp-cat-chip").forEach(ch => ch.classList.remove("sel"));
      chip.classList.add("sel");
    });
    catsEl.appendChild(chip);
  });

  const colorPick = document.getElementById("bp-color-pick");
  colorPick.innerHTML = "";
  COLORS.forEach(c => {
    const sw = document.createElement("div");
    sw.className = "color-swatch" + ((block.colorOverride || cat.color) === c.id ? " active" : "");
    sw.style.background = DOT_COLORS[c.id];
    sw.dataset.color = c.id;
    sw.addEventListener("click", () => {
      colorPick.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
      sw.classList.add("active");
    });
    colorPick.appendChild(sw);
  });

  closeStatsPanel();
  document.getElementById("block-panel").classList.add("open");
  document.getElementById("bp-overlay").classList.add("open");
}

function closeBlockPanel() {
  document.getElementById("block-panel").classList.remove("open");
  document.getElementById("bp-overlay").classList.remove("open");
  editingIdx = null;
}
function closeStatsPanel() {
  document.getElementById("stats-panel").classList.remove("open");
  document.getElementById("sp-overlay").classList.remove("open");
}

function applyBlockPanel() {
  if (editingIdx === null) return;
  pushUndo();
  const block = currentBlocks()[editingIdx];

  block.title = document.getElementById("bp-title").value.trim();
  block.note  = document.getElementById("bp-note").value.trim();

  const parseTime = s => { const [h,m] = s.split(":").map(Number); return h*60+m; };
  const ns = parseTime(document.getElementById("bp-start").value);
  const ne = parseTime(document.getElementById("bp-end").value);
  if (!isNaN(ns) && !isNaN(ne) && ne > ns) { block.startMin = ns; block.endMin = ne; }

  const selChip = document.querySelector(".bp-cat-chip.sel");
  if (selChip) block.cat = selChip.dataset.catId;

  const selColor = document.querySelector("#bp-color-pick .color-swatch.active");
  if (selColor) block.colorOverride = selColor.dataset.color;

  closeBlockPanel();
  renderBlocks();
  toast("Bloc mis à jour");
}

document.getElementById("bp-close").addEventListener("click", closeBlockPanel);
document.getElementById("bp-overlay").addEventListener("click", closeBlockPanel);
document.getElementById("bp-save").addEventListener("click", applyBlockPanel);
document.getElementById("bp-delete").addEventListener("click", () => {
  if (editingIdx === null) return;
  pushUndo();
  currentBlocks().splice(editingIdx, 1);
  closeBlockPanel();
  renderBlocks();
  toast("Bloc supprimé");
});

// ══════════════════════════════════════════════════════════
// Render placed blocks for current week
// ══════════════════════════════════════════════════════════
function renderBlocks() {
  document.querySelectorAll(".placed-block").forEach(el => el.remove());

  const cols   = document.getElementById("day-cols");
  const colEls = cols.querySelectorAll(".day-col");

  currentBlocks().forEach((block, idx) => {
    const col = colEls[block.day];
    if (!col) return;
    const cat   = STATE.cats.find(c => c.id === block.cat) || {label: block.cat, color:"gray", icon:"circle"};
    const color = block.colorOverride || cat.color;
    const y     = minToY(block.startMin);
    const h     = Math.max((block.endMin - block.startMin) / 60 * HOUR_PX, 20);
    const displayTitle = block.title || cat.label;

    const el = document.createElement("div");
    el.className = `placed-block c-${color}`;
    el.style.top    = y + "px";
    el.style.height = h + "px";
    el.dataset.idx  = idx;

    const noteHtml = block.note
      ? `<div class="pb-note">${block.note}</div>`
      : "";

    el.innerHTML = `
      <div class="pb-title"><svg class="ti-svg" style="font-size:10px;margin-right:3px"><use href="#ti-${cat.icon}"></use></svg>${displayTitle}</div>
      <div class="pb-time">${formatTimeShort(block.startMin)}–${formatTimeShort(block.endMin)}</div>
      ${noteHtml}
      <div class="resize-handle" data-idx="${idx}"></div>
    `;

    // Click → open panel (only if not dragging)
    let didMove = false;
    el.addEventListener("mousedown", () => { didMove = false; });
    el.addEventListener("mousemove", () => { didMove = true; });
    el.addEventListener("click", e => {
      if (e.target.closest(".resize-handle")) return;
      if (!didMove) openBlockPanel(idx);
    });

    col.appendChild(el);
    makeDraggable(el, idx);
    makeResizable(el.querySelector(".resize-handle"), idx);
  });

  renderStats();
}

// ══════════════════════════════════════════════════════════
// Render palette
// ══════════════════════════════════════════════════════════
function renderPalette() {
  const pal = document.getElementById("pal-dynamic");
  pal.innerHTML = `<div class="pal-section-label">Blocs</div>`;
  STATE.cats.forEach(cat => {
    const el = document.createElement("div");
    el.className = `pal-block c-${cat.color}`;
    el.draggable = true;
    el.dataset.cat = cat.id;
    el.innerHTML = `<svg class="ti-svg" style="flex-shrink:0"><use href="#ti-${cat.icon}"></use></svg><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat.label}</span>`;

    // Mouse drag (desktop)
    el.addEventListener("dragstart", e => {
      e.dataTransfer.setData("cat", cat.id);
      e.dataTransfer.effectAllowed = "copy";
    });

    // Touch drag (iPad / mobile)
    el.addEventListener("touchstart", e => {
      e.preventDefault();
      const touch = e.touches[0];

      const ghost = document.createElement("div");
      ghost.className = `touch-ghost c-${cat.color}`;
      ghost.innerHTML = `<svg class="ti-svg" style="font-size:14px"><use href="#ti-${cat.icon}"></use></svg>${cat.label}`;
      ghost.style.left = (touch.clientX - 60) + "px";
      ghost.style.top  = (touch.clientY - 22) + "px";
      document.body.appendChild(ghost);

      const onMove = ev => {
        ev.preventDefault();
        const t = ev.touches[0];
        ghost.style.left = (t.clientX - 60) + "px";
        ghost.style.top  = (t.clientY - 22) + "px";
        // Highlight column under finger
        document.querySelectorAll(".day-col").forEach(c => c.classList.remove("drag-over"));
        const colUnder = getColAtPoint(t.clientX, t.clientY);
        if (colUnder) colUnder.classList.add("drag-over");
      };

      const onEnd = ev => {
        document.removeEventListener("touchmove", onMove);
        document.removeEventListener("touchend", onEnd);
        ghost.remove();
        document.querySelectorAll(".day-col").forEach(c => c.classList.remove("drag-over"));

        const t = ev.changedTouches[0];
        const col = getColAtPoint(t.clientX, t.clientY);
        if (!col) return;

        const gridRect = document.getElementById("day-cols").getBoundingClientRect();
        const scrollTop = document.getElementById("scroll-area").scrollTop;
        const relY = t.clientY - gridRect.top + scrollTop;
        const startMin = Math.max(HOUR_START * 60, Math.min(yToMin(relY), HOUR_END * 60 - 60));
        const endMin   = Math.min(startMin + 60, HOUR_END * 60);
        pushUndo();
        currentBlocks().push({ day: parseInt(col.dataset.di), cat: cat.id, startMin, endMin });
        renderBlocks(); renderWeekChips();
        toast(`${cat.label} ajouté`);
      };

      document.addEventListener("touchmove", onMove, {passive:false});
      document.addEventListener("touchend", onEnd);
    }, {passive:false});

    // Bouton ✎ édition catégorie
    const editBtn = document.createElement("span");
    editBtn.className = "pal-edit";
    editBtn.textContent = "✎";
    editBtn.title = "Modifier";
    editBtn.addEventListener("mousedown", e => e.stopPropagation());
    editBtn.addEventListener("touchstart", e => e.stopPropagation(), {passive:true});
    editBtn.addEventListener("click", e => { e.stopPropagation(); openEditCatModal(cat.id); });
    el.appendChild(editBtn);

    pal.appendChild(el);
  });

  // Bouton "+ Nouvelle catégorie" en bas de palette
  const sep = document.createElement("div"); sep.className = "pal-sep"; pal.appendChild(sep);
  const addBtn = document.createElement("div");
  addBtn.className = "pal-add";
  addBtn.innerHTML = `<svg class="ti-svg" style="font-size:13px"><use href="#ti-plus"></use></svg> Nouvelle catégorie`;
  addBtn.addEventListener("click", () => openCreateCatModal());
  pal.appendChild(addBtn);

  renderStats();
  autoSave();
}

// Helper : find .day-col element at screen coordinates
function getColAtPoint(x, y) {
  const cols = document.querySelectorAll(".day-col");
  for (const col of cols) {
    const r = col.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return col;
  }
  return null;
}

// ══════════════════════════════════════════════════════════
// Drop onto columns (desktop drag from palette)
// ══════════════════════════════════════════════════════════
function setupDropZones() {
  const colEls = document.querySelectorAll(".day-col");
  colEls.forEach(col => {
    col.addEventListener("dragover", e => {
      e.preventDefault(); e.dataTransfer.dropEffect = "copy";
      col.classList.add("drag-over");
    });
    col.addEventListener("dragleave", () => col.classList.remove("drag-over"));
    col.addEventListener("drop", e => {
      e.preventDefault(); col.classList.remove("drag-over");
      const catId = e.dataTransfer.getData("cat");
      if (!catId) return;
      const gridRect = document.getElementById("day-cols").getBoundingClientRect();
      const relY = e.clientY - gridRect.top + document.getElementById("scroll-area").scrollTop;
      const startMin = Math.max(HOUR_START * 60, Math.min(yToMin(relY), HOUR_END * 60 - 60));
      const endMin   = Math.min(startMin + 60, HOUR_END * 60);
      pushUndo();
      currentBlocks().push({ day: parseInt(col.dataset.di), cat: catId, startMin, endMin });
      renderBlocks(); renderWeekChips();
    });
  });
}

// ══════════════════════════════════════════════════════════
// Drag placed blocks (move) — mouse + touch
// ══════════════════════════════════════════════════════════
function makeDraggable(el, idx) {
  // ── Mouse ──
  el.addEventListener("mousedown", e => {
    if (e.target.closest(".resize-handle")) return;
    if (e.button !== 0) return;

    const block    = currentBlocks()[idx];
    const startY   = e.clientY;
    const startX   = e.clientX;
    const startTop = minToY(block.startMin);
    let dragging   = false;
    let ghost      = null;

    const onMove = e2 => {
      const dy = e2.clientY - startY;
      const dx = e2.clientX - startX;
      if (!dragging && Math.abs(dy) < 5 && Math.abs(dx) < 5) return;

      if (!dragging) {
        dragging = true;
        e.preventDefault();
        pushUndo();
        ghost = el.cloneNode(true);
        ghost.style.cssText = `opacity:.5;pointer-events:none;position:absolute;z-index:20;top:${el.style.top};left:${el.style.left};right:${el.style.right};height:${el.style.height}`;
        el.parentElement.appendChild(ghost);
        el.style.opacity = "0.25";
      }

      const newTop = Math.max(0, Math.min(startTop + dy, TOTAL_H - 20));
      ghost.style.top = newTop + "px";

      const colEls = Array.from(document.querySelectorAll(".day-col"));
      for (const col of colEls) {
        const r = col.getBoundingClientRect();
        if (e2.clientX >= r.left && e2.clientX <= r.right) {
          currentBlocks()[idx].day = parseInt(col.dataset.di);
          break;
        }
      }
    };

    const onUp = e2 => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      if (!dragging) return;
      if (ghost) { ghost.remove(); ghost = null; }
      el.style.opacity = "";
      const dy  = e2.clientY - startY;
      const b   = currentBlocks()[idx];
      const dur = b.endMin - b.startMin;
      const ns  = yToMin(Math.max(0, Math.min(startTop + dy, TOTAL_H - 20)));
      b.startMin = Math.max(HOUR_START * 60, Math.min(ns, HOUR_END * 60 - dur));
      b.endMin   = b.startMin + dur;
      renderBlocks();
    };

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });

  // ── Touch ──
  el.addEventListener("touchstart", e => {
    if (e.target.closest(".resize-handle")) return;
    e.preventDefault();

    const block    = currentBlocks()[idx];
    const touch0   = e.touches[0];
    const startY   = touch0.clientY;
    const startX   = touch0.clientX;
    const startTop = minToY(block.startMin);
    let dragging   = false;
    let ghost      = null;

    const onMove = ev => {
      ev.preventDefault();
      const t  = ev.touches[0];
      const dy = t.clientY - startY;
      const dx = t.clientX - startX;
      if (!dragging && Math.abs(dy) < 5 && Math.abs(dx) < 5) return;

      if (!dragging) {
        dragging = true;
        pushUndo();
        ghost = el.cloneNode(true);
        ghost.style.cssText = `opacity:.5;pointer-events:none;position:absolute;z-index:20;top:${el.style.top};left:${el.style.left};right:${el.style.right};height:${el.style.height}`;
        el.parentElement.appendChild(ghost);
        el.style.opacity = "0.25";
      }

      const newTop = Math.max(0, Math.min(startTop + dy, TOTAL_H - 20));
      ghost.style.top = newTop + "px";

      const colEls = Array.from(document.querySelectorAll(".day-col"));
      for (const col of colEls) {
        const r = col.getBoundingClientRect();
        if (t.clientX >= r.left && t.clientX <= r.right) {
          currentBlocks()[idx].day = parseInt(col.dataset.di);
          break;
        }
      }
    };

    const onEnd = ev => {
      document.removeEventListener("touchmove", onMove);
      document.removeEventListener("touchend", onEnd);

      if (!dragging) {
        openBlockPanel(idx);
        return;
      }

      if (ghost) { ghost.remove(); ghost = null; }
      el.style.opacity = "";

      const t   = ev.changedTouches[0];
      const dy  = t.clientY - startY;
      const b   = currentBlocks()[idx];
      const dur = b.endMin - b.startMin;
      const ns  = yToMin(Math.max(0, Math.min(startTop + dy, TOTAL_H - 20)));
      b.startMin = Math.max(HOUR_START * 60, Math.min(ns, HOUR_END * 60 - dur));
      b.endMin   = b.startMin + dur;
      renderBlocks();
    };

    document.addEventListener("touchmove", onMove, {passive:false});
    document.addEventListener("touchend", onEnd);
  }, {passive:false});
}

// ══════════════════════════════════════════════════════════
// Resize placed blocks — mouse + touch
// ══════════════════════════════════════════════════════════
function makeResizable(handle, idx) {
  // ── Mouse ──
  handle.addEventListener("mousedown", e => {
    e.preventDefault(); e.stopPropagation();
    pushUndo();
    const startY = e.clientY;
    const block  = currentBlocks()[idx];
    const startEndMin = block.endMin;

    const onMove = e2 => {
      const dy = e2.clientY - startY;
      const newEndMin = yToMin(minToY(startEndMin) + dy);
      block.endMin = Math.max(block.startMin + SNAP_MIN, Math.min(newEndMin, HOUR_END * 60));
      const el = document.querySelector(`.placed-block[data-idx="${idx}"]`);
      if (el) {
        el.style.height = Math.max((block.endMin - block.startMin) / 60 * HOUR_PX, 18) + "px";
        const timeEl = el.querySelector(".pb-time");
        if (timeEl) timeEl.textContent = `${formatTime(block.startMin)} – ${formatTime(block.endMin)}`;
      }
    };
    const onUp = () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      renderBlocks();
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });

  // ── Touch ──
  handle.addEventListener("touchstart", e => {
    e.preventDefault(); e.stopPropagation();
    pushUndo();
    const touch = e.touches[0];
    const startY = touch.clientY;
    const block  = currentBlocks()[idx];
    const startEndMin = block.endMin;

    const onMove = ev => {
      ev.preventDefault();
      const t  = ev.touches[0];
      const dy = t.clientY - startY;
      const newEndMin = yToMin(minToY(startEndMin) + dy);
      block.endMin = Math.max(block.startMin + SNAP_MIN, Math.min(newEndMin, HOUR_END * 60));
      const el = document.querySelector(`.placed-block[data-idx="${idx}"]`);
      if (el) {
        el.style.height = Math.max((block.endMin - block.startMin) / 60 * HOUR_PX, 18) + "px";
        const timeEl = el.querySelector(".pb-time");
        if (timeEl) timeEl.textContent = `${formatTime(block.startMin)} – ${formatTime(block.endMin)}`;
      }
    };
    const onEnd = () => {
      document.removeEventListener("touchmove", onMove);
      document.removeEventListener("touchend", onEnd);
      renderBlocks();
    };
    document.addEventListener("touchmove", onMove, {passive:false});
    document.addEventListener("touchend", onEnd);
  }, {passive:false});
}

// ══════════════════════════════════════════════════════════
// Week chips (saved weeks bar)
// ══════════════════════════════════════════════════════════
function renderWeekChips() {
  const container = document.getElementById("week-chips");
  container.innerHTML = "";
  const keys = Object.keys(STATE.weeks).sort().reverse();
  if (keys.length === 0) {
    container.innerHTML = `<span style="font-size:11px;color:var(--text3)">Aucune semaine sauvegardée</span>`;
    return;
  }
  keys.forEach(k => {
    const chip = document.createElement("button");
    chip.className = "week-chip" + (k === selectedSavedWeek ? " active" : "");
    chip.textContent = weekLabel(k);
    chip.addEventListener("click", () => {
      selectedSavedWeek = selectedSavedWeek === k ? null : k;
      renderWeekChips();
    });
    container.appendChild(chip);
  });
}

// ══════════════════════════════════════════════════════════
// Highlight today
// ══════════════════════════════════════════════════════════
function highlightToday() {
  const todayKey = getWeekKey(new Date());
  const todayIdx = (() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; })();
  document.querySelectorAll(".day-head").forEach(h => {
    const di = parseInt(h.dataset.di);
    h.classList.toggle("today", STATE.currentWeek === todayKey && di === todayIdx);
    h.classList.toggle("day-selected", viewMode === "day" && di === selectedDay);
  });
  document.querySelectorAll(".day-col").forEach(c => {
    c.classList.toggle("day-selected", viewMode === "day" && parseInt(c.dataset.di) === selectedDay);
  });
  document.body.classList.toggle("day-view", viewMode === "day");
}

// ══════════════════════════════════════════════════════════
// Modal — new category
// ══════════════════════════════════════════════════════════
function buildColorPicker(sel) {
  sel = sel || "blue";
  const pick = document.getElementById("color-pick");
  pick.innerHTML = "";
  COLORS.forEach(c => {
    const sw = document.createElement("div");
    sw.className = "color-swatch" + (c.id === sel ? " active" : "");
    sw.style.background = DOT_COLORS[c.id];
    sw.dataset.color = c.id;
    sw.addEventListener("click", () => {
      pick.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
      sw.classList.add("active");
    });
    pick.appendChild(sw);
  });
}

// ── Fonctions modal catégorie ──
function openCreateCatModal() {
  document.getElementById("modal-cat-id").value = "";
  document.getElementById("modal-title").textContent = "Nouvelle catégorie";
  document.getElementById("modal-name").value = "";
  document.getElementById("modal-icon").value = "";
  document.getElementById("modal-ok").textContent = "Ajouter";
  document.getElementById("modal-delete").style.display = "none";
  document.getElementById("modal-up").style.display   = "none";
  document.getElementById("modal-down").style.display = "none";
  buildColorPicker();
  document.getElementById("modal-bg").classList.add("open");
  setTimeout(() => document.getElementById("modal-name").focus(), 50);
}

function openEditCatModal(catId) {
  const cat = STATE.cats.find(c => c.id === catId);
  if (!cat) return;
  const idx = STATE.cats.indexOf(cat);
  document.getElementById("modal-cat-id").value = catId;
  document.getElementById("modal-title").textContent = "Modifier la catégorie";
  document.getElementById("modal-name").value = cat.label;
  document.getElementById("modal-icon").value = cat.icon;
  document.getElementById("modal-ok").textContent = "Modifier";
  document.getElementById("modal-delete").style.display = "";
  document.getElementById("modal-up").style.display   = idx > 0 ? "" : "none";
  document.getElementById("modal-down").style.display = idx < STATE.cats.length - 1 ? "" : "none";
  buildColorPicker(cat.color);
  document.getElementById("modal-bg").classList.add("open");
}

document.getElementById("modal-cancel").addEventListener("click", () => {
  document.getElementById("modal-bg").classList.remove("open");
});
document.getElementById("modal-ok").addEventListener("click", () => {
  const name = document.getElementById("modal-name").value.trim();
  if (!name) return;
  const color = document.querySelector("#color-pick .color-swatch.active")?.dataset.color || "blue";
  const icon  = document.getElementById("modal-icon").value.trim() || "square";
  const catId = document.getElementById("modal-cat-id").value;
  if (catId) {
    // Mode édition
    const cat = STATE.cats.find(c => c.id === catId);
    if (cat) { cat.label = name; cat.color = color; cat.icon = icon; }
    document.getElementById("modal-bg").classList.remove("open");
    renderPalette(); renderBlocks(); toast("Catégorie modifiée");
  } else {
    // Mode création
    const id = "cat_" + Date.now();
    STATE.cats.push({id, label:name, color, icon});
    document.getElementById("modal-bg").classList.remove("open");
    renderPalette(); toast("Catégorie ajoutée");
  }
});
document.getElementById("modal-delete").addEventListener("click", () => {
  const catId = document.getElementById("modal-cat-id").value;
  if (!catId) return;
  if (!confirm("Supprimer cette catégorie ? Les blocs associés seront aussi supprimés.")) return;
  STATE.cats = STATE.cats.filter(c => c.id !== catId);
  Object.keys(STATE.weeks).forEach(k => {
    STATE.weeks[k] = (STATE.weeks[k] || []).filter(b => b.cat !== catId);
  });
  document.getElementById("modal-bg").classList.remove("open");
  renderPalette(); renderBlocks(); toast("Catégorie supprimée");
});

// ══════════════════════════════════════════════════════════
// Export semaine (PDF / CSV / DOC)
// ══════════════════════════════════════════════════════════
const DAYS_FULL = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];

function exportWeekPDF() {
  const blocks = currentBlocks();
  let rows = "";
  for (let d = 0; d < 7; d++) {
    const dayBlocks = blocks.filter(b => b.day === d).sort((a,b) => a.startMin - b.startMin);
    if (!dayBlocks.length) continue;
    rows += `<div class="day"><div class="day-title">${DAYS_FULL[d]}</div>`;
    dayBlocks.forEach(b => {
      const cat = STATE.cats.find(c => c.id === b.cat) || {label:b.cat, color:"gray"};
      const dot = DOT_COLORS[cat.color] || "#888";
      const title = b.title || cat.label;
      rows += `<div class="row">
        <span class="time">${formatTime(b.startMin)} – ${formatTime(b.endMin)}</span>
        <span class="dot" style="background:${dot}"></span>
        <span class="cat">${cat.label}</span>
        <span class="title">${title !== cat.label ? title : ""}${b.note ? `<em> — ${b.note}</em>` : ""}</span>
      </div>`;
    });
    rows += `</div>`;
  }
  if (!rows) { toast("Aucun bloc à exporter"); return; }

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>EDT — ${weekLabel(STATE.currentWeek)}</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px 32px;color:#1a1916;max-width:700px}
    h1{font-size:17px;font-weight:700;margin-bottom:20px;color:#3b7dd8}
    .day{margin-bottom:18px;break-inside:avoid}
    .day-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6a6760;border-bottom:1px solid #ddd;padding-bottom:5px;margin-bottom:8px}
    .row{display:flex;align-items:baseline;gap:8px;padding:4px 0;border-bottom:1px solid #f5f3f0;font-size:12px}
    .time{color:#6a6760;width:110px;flex-shrink:0}
    .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
    .cat{font-weight:600;width:80px;flex-shrink:0}
    .title{flex:1;color:#1a1916} em{color:#aaa;font-style:italic}
    @media print{body{padding:12px 16px}@page{margin:1.5cm}}
  </style></head><body>
  <h1>EDT — ${weekLabel(STATE.currentWeek)}</h1>
  ${rows}
  </body></html>`;

  const win = window.open("", "_blank");
  if (!win) { toast("Autorise les popups pour l'export PDF"); return; }
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 400);
}

function exportWeekCSV() {
  const blocks = currentBlocks();
  const rows = [["Jour","Catégorie","Début","Fin","Durée (min)","Titre","Commentaire"]];
  blocks.slice().sort((a,b) => a.day - b.day || a.startMin - b.startMin).forEach(b => {
    const cat = STATE.cats.find(c => c.id === b.cat) || {label:b.cat};
    rows.push([
      DAYS_FULL[b.day], cat.label,
      formatTime(b.startMin), formatTime(b.endMin),
      b.endMin - b.startMin,
      b.title || cat.label,
      b.note || ""
    ]);
  });
  if (rows.length < 2) { toast("Aucun bloc à exporter"); return; }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `edt-thom-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
  toast("Export Excel (CSV) téléchargé");
}

function exportWeekDOC() {
  const blocks = currentBlocks();
  let tables = "";
  for (let d = 0; d < 7; d++) {
    const dayBlocks = blocks.filter(b => b.day === d).sort((a,b) => a.startMin - b.startMin);
    if (!dayBlocks.length) continue;
    tables += `<h2 style="font-size:12pt;margin:14pt 0 6pt;color:#2c3e50">${DAYS_FULL[d]}</h2>
    <table border="1" cellspacing="0" cellpadding="6" style="border-collapse:collapse;width:100%;font-size:10pt">
    <tr style="background:#f0ede8"><th>Horaire</th><th>Catégorie</th><th>Titre</th><th>Commentaire</th></tr>`;
    dayBlocks.forEach(b => {
      const cat = STATE.cats.find(c => c.id === b.cat) || {label:b.cat};
      tables += `<tr>
        <td style="white-space:nowrap">${formatTime(b.startMin)} – ${formatTime(b.endMin)}</td>
        <td><b>${cat.label}</b></td>
        <td>${b.title || cat.label}</td>
        <td><i style="color:#888">${b.note || ""}</i></td>
      </tr>`;
    });
    tables += `</table>`;
  }
  if (!tables) { toast("Aucun bloc à exporter"); return; }
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:w="urn:schemas-microsoft-com:office:word"
    xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="UTF-8"><title>EDT ${weekLabel(STATE.currentWeek)}</title>
    <style>body{font-family:Calibri,sans-serif;margin:2cm}
    </style>
    </head><body>
    <h1 style="font-size:16pt;color:#3b7dd8">EDT — ${weekLabel(STATE.currentWeek)}</h1>
    ${tables}</body></html>`;
  const blob = new Blob([html], {type:"application/msword"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `edt-thom-${new Date().toISOString().slice(0,10)}.doc`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
  toast("Export Word (.doc) téléchargé");
}

// ══════════════════════════════════════════════════════════
// Notifications
// ══════════════════════════════════════════════════════════
let notifEnabled = false;
let notifTimers  = [];

function clearNotifTimers() {
  notifTimers.forEach(t => clearTimeout(t));
  notifTimers = [];
  if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: "CLEAR_NOTIFS" });
  }
}

const NOTIF_WARN_MIN = 5; // minutes d'avertissement avant chaque bloc

function scheduleNotifications() {
  clearNotifTimers();
  if (!notifEnabled) return;
  const todayKey = getWeekKey(new Date());
  if (!STATE.weeks[todayKey]) return;
  const now      = new Date();
  const todayIdx = (() => { const d = now.getDay(); return d === 0 ? 6 : d - 1; })();
  const nowMin   = now.getHours() * 60 + now.getMinutes();

  const notifs = STATE.weeks[todayKey]
    .filter(b => b.day === todayIdx && b.endMin > nowMin)
    .map(b => {
      const cat   = STATE.cats.find(c => c.id === b.cat) || { label: b.cat };
      const title = b.title || cat.label;
      const startMs = new Date(
        now.getFullYear(), now.getMonth(), now.getDate(),
        Math.floor(b.startMin / 60), b.startMin % 60, 0, 0
      ).getTime();
      return {
        title,
        startTime: formatTime(b.startMin),
        endTime:   formatTime(b.endMin),
        startMs,
        note: b.note || "",
        tag:  `${b.day}_${b.startMin}_${b.cat}`
      };
    });

  // ── Envoi au Service Worker (background) ────────────────────────────────
  if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: "SCHEDULE_NOTIFS", notifs });
    return; // le SW gère tout
  }

  // ── Fallback en-page (si SW absent ou file://) ───────────────────────────
  const nowMs = Date.now();
  notifs.forEach(n => {
    const warnMs  = n.startMs - nowMs - NOTIF_WARN_MIN * 60000;
    const startMs = n.startMs - nowMs;
    if (warnMs > 0) {
      notifTimers.push(setTimeout(() => {
        new Notification(`⏰ Dans ${NOTIF_WARN_MIN} min — ${n.title}`, {
          body: `Commence à ${n.startTime}`
        });
      }, warnMs));
    }
    if (startMs > -60000) {
      notifTimers.push(setTimeout(() => {
        new Notification(`🟢 ${n.title} commence`, {
          body: `${n.startTime} → ${n.endTime}${n.note ? "\n" + n.note : ""}`
        });
      }, Math.max(0, startMs)));
    }
  });
}

document.getElementById("btn-notif").addEventListener("click", async () => {
  if (!("Notification" in window)) { toast("Notifications non supportées"); return; }
  if (!notifEnabled) {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { toast("Notifications refusées"); return; }
    notifEnabled = true;
    document.getElementById("btn-notif").classList.add("btn-notif-on");
    scheduleNotifications();
    savePrefs();
    toast("Rappels activés ✓");
  } else {
    notifEnabled = false;
    clearNotifTimers();
    document.getElementById("btn-notif").classList.remove("btn-notif-on");

    toast("Rappels désactivés");

// Stats panel
// ══════════════════════════════════════════════════════════
function openStatsPanel() {
  closeBlockPanel();
  const blocks  = currentBlocks();
  const prevKey = (() => {
    const mon = weekKeyToMonday(STATE.currentWeek);
    mon.setDate(mon.getDate() - 7);
    return getWeekKey(mon);
  })();
  const prevBlocks = STATE.weeks[prevKey] || [];

  const calcMins = (blks) => {
    const m = {};
    STATE.cats.forEach(c => { m[c.id] = 0; });
    blks.forEach(b => { if (m[b.cat] !== undefined) m[b.cat] += b.endMin - b.startMin; });
    return m;
  };
  const cur  = calcMins(blocks);
  const prev = calcMins(prevBlocks);

  const totalCur  = Object.values(cur).reduce((a,b) => a+b, 0);
  const totalPrev = Object.values(prev).reduce((a,b) => a+b, 0);
  const maxMins   = Math.max(...Object.values(cur), 60);

  const fmtH = m => {
    const h = Math.floor(m/60), mn = m%60;
    return h ? `${h}h${mn ? String(mn).padStart(2,'0') : ''}` : `${mn}min`;
  };

  let html = "";
  STATE.cats.filter(c => cur[c.id] > 0).sort((a,b) => cur[b.id]-cur[a.id]).forEach(cat => {
    const mins = cur[cat.id];
    const pct  = Math.round((mins / maxMins) * 100);
    const dot  = DOT_COLORS[cat.color] || "#888";
    html += `<div class="sp-cat-row">
      <div class="sp-dot" style="background:${dot}"></div>
      <div class="sp-name">${cat.label}</div>
      <div class="sp-bar-wrap"><div class="sp-bar" style="width:0;background:${dot}" data-w="${pct}"></div></div>
      <div class="sp-val">${fmtH(mins)}</div>
    </div>`;
  });

  if (!html) html = `<p style="font-size:12px;color:var(--text3);text-align:center;margin-top:24px">Aucun bloc cette semaine</p>`;

  const diff = totalCur - totalPrev;
  const diffStr = diff === 0 ? "= semaine préc." : (diff > 0 ? `▲ +${fmtH(diff)} vs sem. préc.` : `▼ −${fmtH(Math.abs(diff))} vs sem. préc.`);
  const diffClass = diff > 0 ? "up" : diff < 0 ? "down" : "";

  html += `<div class="sp-sep"></div>
    <div class="sp-total">Total planifié : ${fmtH(totalCur)}</div>
    ${totalPrev > 0 ? `<div class="sp-compare ${diffClass}">${diffStr}</div>` : ""}`;

  document.getElementById("sp-body").innerHTML = html;
  // Animer les barres (width:0 → cible via CSS transition)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('#sp-body .sp-bar[data-w]').forEach(b => {
        b.style.width = b.dataset.w + '%';
      });
    });
  });
  document.getElementById("sp-week-label").textContent = weekLabel(STATE.currentWeek);
  document.getElementById("stats-panel").classList.add("open");
  document.getElementById("sp-overlay").classList.add("open");
}

// ── Parsing CSV ──
function parseTemplateCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const sep = lines[0].includes(';') ? ';' : ',';
  const DAY_MAP = {
    'lundi':0,'lun':0,'monday':0,'0':0,
    'mardi':1,'mar':1,'tuesday':1,'1':1,
    'mercredi':2,'mer':2,'wednesday':2,'2':2,
    'jeudi':3,'jeu':3,'thursday':3,'3':3,
    'vendredi':4,'ven':4,'friday':4,'4':4,
    'samedi':5,'sam':5,'saturday':5,'5':5,
    'dimanche':6,'dim':6,'sunday':6,'6':6
  };
  const parseT = s => {
    s = (s||'').trim();
    const m = s.match(/^(\d{1,2})[h:hH](\d{2})$/) || s.match(/^(\d{1,2})h?$/i);
    return m ? parseInt(m[1])*60 + parseInt(m[2]||0) : NaN;
  };
  const tmpls = {};
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(sep).map(x => x.trim().replace(/^"|"$/g,''));
    if (cells.length < 5) continue;
    const [name, dayStr, catStr, startS, endS, title='', note=''] = cells;
    const day = DAY_MAP[(dayStr||'').toLowerCase()];
    if (day === undefined) continue;
    const startMin = parseT(startS), endMin = parseT(endS);
    if (isNaN(startMin)||isNaN(endMin)||endMin<=startMin) continue;
    const cat = STATE.cats.find(c =>
      c.label.toLowerCase() === (catStr||'').toLowerCase() || c.id === catStr
    );
    if (!tmpls[name]) tmpls[name] = {id:'tmpl_'+Date.now()+'_'+Math.random().toString(36).slice(2), name, blocks:[]};
    tmpls[name].blocks.push({day, cat: cat?cat.id:catStr, startMin, endMin, title:title||'', note:note||''});
  }
  return Object.values(tmpls);
}
