document.getElementById("pal-backdrop").addEventListener("click", () => {
  const pal = document.getElementById("palette");
  if (!pal.classList.contains("collapsed")) _togglePalette();
});

// ══════════════════════════════════════════════════════════
// Dupliquer un bloc
// ══════════════════════════════════════════════════════════
document.getElementById("bp-duplicate").addEventListener("click", () => {
  if (editingIdx === null) return;
  pushUndo();
  const copy = JSON.parse(JSON.stringify(currentBlocks()[editingIdx]));
  currentBlocks().push(copy);
  closeBlockPanel();
  renderBlocks();
  toast("Bloc dupliqué");
});

// ══════════════════════════════════════════════════════════
// Réordonner catégories (↑↓ dans modal)
// ══════════════════════════════════════════════════════════
document.getElementById("modal-up").addEventListener("click", () => {
  const catId = document.getElementById("modal-cat-id").value;
  const idx = STATE.cats.findIndex(c => c.id === catId);
  if (idx > 0) {
    [STATE.cats[idx-1], STATE.cats[idx]] = [STATE.cats[idx], STATE.cats[idx-1]];
    renderPalette();
    document.getElementById("modal-bg").classList.remove("open");
    toast("Catégorie déplacée");
  }
});
document.getElementById("modal-down").addEventListener("click", () => {
  const catId = document.getElementById("modal-cat-id").value;
  const idx = STATE.cats.findIndex(c => c.id === catId);
  if (idx < STATE.cats.length - 1) {
    [STATE.cats[idx], STATE.cats[idx+1]] = [STATE.cats[idx+1], STATE.cats[idx]];
    renderPalette();
    document.getElementById("modal-bg").classList.remove("open");
    toast("Catégorie déplacée");
  }
});

// ══════════════════════════════════════════════════════════
// Events
// ══════════════════════════════════════════════════════════
document.getElementById("btn-prev").addEventListener("click", () => shiftWeek(-1));
document.getElementById("btn-next").addEventListener("click", () => shiftWeek(1));
document.getElementById("btn-today").addEventListener("click", () => {
  STATE.currentWeek = getWeekKey(new Date());
  render();
});
document.getElementById("btn-save").addEventListener("click", () => {
  ensureWeek(STATE.currentWeek);
  saveState();
  toast("Semaine sauvegardée ✓");
  renderWeekChips();
});
document.getElementById("btn-copy-week").addEventListener("click", () => {
  if (!selectedSavedWeek) { toast("Sélectionne d'abord une semaine en bas"); return; }
  if (selectedSavedWeek === STATE.currentWeek) { toast("C'est déjà la semaine courante"); return; }
  pushUndo();
  STATE.weeks[STATE.currentWeek] = JSON.parse(JSON.stringify(STATE.weeks[selectedSavedWeek] || []));
  renderBlocks(); toast(`Semaine copiée vers ${weekLabel(STATE.currentWeek)}`);
});

// Keyboard shortcuts
document.addEventListener("keydown", e => {
  if (document.getElementById("pin-screen")) return; // PIN actif
  // Escape : ferme modal ET tous les panneaux
  if (e.key === "Escape") {
    document.getElementById("modal-bg").classList.remove("open");
    closeBlockPanel();
    closeStatsPanel();
    closeTemplatesPanel();
  }
  // Ctrl+Z / ⌘Z : annuler
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    const tag = document.activeElement.tagName;
    if (tag !== "INPUT" && tag !== "TEXTAREA") { e.preventDefault(); undo(); }
    return;
  }
  // S : sauvegarder (sauf si focus dans un input/textarea)
  if (e.key === "s" || e.key === "S") {
    const tag = document.activeElement.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA") return;
    ensureWeek(STATE.currentWeek);
    saveState();
    toast("Semaine sauvegardée ✓");
    renderWeekChips();
  }
});

// ══════════════════════════════════════════════════════════
// Init (déclenché après validation PIN)
// ══════════════════════════════════════════════════════════




async function _initApp() {
  if (!STATE.templates) STATE.templates = [];
  if (_PREFS.zoomIdx !== undefined) {
    zoomIdx = _PREFS.zoomIdx;
    HOUR_PX  = ZOOM_LEVELS[zoomIdx];
    TOTAL_H  = HOURS * HOUR_PX;
  }
  buildGrid();
  setupDropZones();
  renderPalette();
  if (_PREFS.viewMode) {
    viewMode = _PREFS.viewMode;
    document.getElementById("btn-view-week").classList.toggle("active", viewMode === "week");
    document.getElementById("btn-view-day").classList.toggle("active", viewMode === "day");
  }
  render();
  const _zlInit = document.getElementById("zoom-level");
  if (_zlInit) _zlInit.textContent = zoomIdx + 1;
  const _palIcon2 = document.getElementById("pal-topbar-icon");
  if (window.innerWidth <= 640) {
    document.getElementById("palette").classList.add("collapsed");
    if (_palIcon2) _setIconName(_palIcon2, "layout-sidebar-left-expand");
    selectedDay = (() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; })();
  } else if (_PREFS.palCollapsed) {
    document.getElementById("palette").classList.add("collapsed");
    if (_palIcon2) _setIconName(_palIcon2, "layout-sidebar-left-expand");
  }
  setTimeout(() => {
    const _now = new Date();
    const _nowMin = _now.getHours() * 60 + _now.getMinutes();
    const _target = (_nowMin >= HOUR_START * 60 && _nowMin <= HOUR_END * 60)
      ? Math.max(_nowMin - 60, HOUR_START * 60) : 7 * 60;
    document.getElementById("scroll-area").scrollTop = minToY(_target);
  }, 80);

  // ── Service Worker ────────────────────────────────────────────────────────
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js")
      .then(reg => {
        // Attendre que le SW contrôle la page
        if (!navigator.serviceWorker.controller) {
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (notifEnabled) scheduleNotifications();
          });
        }
        console.log("[EDT] SW enregistré :", reg.scope);
      })
      .catch(e => console.warn("[EDT] SW non disponible (file:// ?) :", e.message));
  }

  // ── Restaurer les notifs depuis les prefs ─────────────────────────────────
  if (_PREFS.notifEnabled && "Notification" in window && Notification.permission === "granted") {
    notifEnabled = true;
    document.getElementById("btn-notif").classList.add("btn-notif-on");
    scheduleNotifications();
  }
}

// ── PIN screen logic ──
let _pinBuf = "";

function _pinUpdateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById("pd" + i).classList.toggle("filled", i < _pinBuf.length);
  }
}
function _pinShowError(msg) {
  document.getElementById("pin-error").textContent = msg;
  const dotsEl = document.getElementById("pin-dots");
  dotsEl.classList.remove("shake");
  void dotsEl.offsetWidth; // reflow
  dotsEl.classList.add("shake");
  setTimeout(() => dotsEl.classList.remove("shake"), 400);
  _pinBuf = "";
  _pinUpdateDots();
}

// Hash SHA-256 du PIN par défaut (jamais le PIN en clair dans le source)
const _DEFAULT_PIN_HASH = "FAvvlEkUlMZSlcgLACnUsBgbMHPRMTH1UTB47UNOE4o=";

function _setIconName(el,name){var u=el&&el.querySelector("use");if(u)u.setAttribute("href","#ti-"+name);}
async function _hashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

async function _pinUnlock() {
  _cryptoKey = await _deriveKey(_pinBuf);
  const raw = localStorage.getItem("edt_v3");
  if (raw) {
    try {
      const dec = await _decryptJSON(raw);
      if (dec && dec.cats && dec.weeks) STATE = dec;
    } catch(e) {}
  }
  await _initApp();
  const ps = document.getElementById("pin-screen");
  ps.style.transition = "opacity .28s ease";
  ps.style.opacity = "0";
  setTimeout(() => ps.remove(), 310);
}

async function _pinSubmit() {
  const stored = localStorage.getItem("edt_pin_hash") || _DEFAULT_PIN_HASH;
  const entered = await _hashPin(_pinBuf);
  if (entered !== stored) { _pinShowError("Code incorrect"); return; }
  document.getElementById("pin-error").textContent = "";
  try { await _pinUnlock(); }
  catch(e) { _pinShowError("Erreur d'initialisation"); }
}

// Numpad
document.querySelectorAll(".pin-key[data-k]").forEach(btn => {
  btn.addEventListener("click", () => {
    if (_pinBuf.length >= 4) return;
    _pinBuf += btn.dataset.k;
    _pinUpdateDots();
    if (_pinBuf.length === 4) setTimeout(_pinSubmit, 100);
  });
});
document.getElementById("pin-del").addEventListener("click", () => {
  _pinBuf = _pinBuf.slice(0, -1);
  document.getElementById("pin-error").textContent = "";
  _pinUpdateDots();
});
// Saisie clavier sur l'écran PIN
document.addEventListener("keydown", e => {
  if (!document.getElementById("pin-screen")) return;
  if (e.key >= "0" && e.key <= "9" && _pinBuf.length < 4) {
    _pinBuf += e.key;
    _pinUpdateDots();
    if (_pinBuf.length === 4) setTimeout(_pinSubmit, 100);
  } else if (e.key === "Backspace") {
    _pinBuf = _pinBuf.slice(0, -1);
    document.getElementById("pin-error").textContent = "";
    _pinUpdateDots();
  } else if (e.key === "Enter" && _pinBuf.length === 4) {
    _pinSubmit();
  }
});
</script>
